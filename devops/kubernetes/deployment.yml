apiVersion: v1
kind: Deployment
metadata:
  name: my-application
  labels:
    app: nginx
spec:
  replicas: 5
  strategy: RollingUpdarte
  rollingUpdate:
  selector:
    matchLabels:
      app : ngnix
  template:
    metadata:
      labels:
        app: ngnix
    spec:
      containers:
        - name: my-project-demo-kubernets
          image: nginx
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: my-project
  labels: 
    app: my-project
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocals: TCP
      port: 80
      targetPort: 8080
      NodePort: 30000