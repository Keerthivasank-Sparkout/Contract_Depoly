apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-frontend
  labels:
    app: task-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-frontend

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: task-frontend

    spec:
      containers:
        - name: task-frontend
          image: task-frontend
          imagePullPolicy: Never
          ports:
            - containerPort: 5371

---
apiVersion: v1
kind: Service

metadata:
  name: task-frontend-service

spec:
  type: NodePort

  selector:
    app: task-frontend

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
      nodePort: 30007