apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-management
  labels:
    app: task-management

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-management

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: task-management

    spec:
      containers:
        - name: task-frontend
          image: kubernetes-frontend
          ports:
            - containerPort: 5371

        - name: task-backend
          image: kubernetes-backend
          ports:
            - containerPort: 3001

---
apiVersion: v1
kind: Service

metadata:
  name: task-management-service

spec:
  type: NodePort

  selector:
    app: task-management

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5371
      nodePort: 30007