services:
  backend:
    build: ./server
    container_name: backend
    restart: always

    env_file:
      - ./server/.env

    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http:localhost:3001/api

    container_name: frontend
    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend