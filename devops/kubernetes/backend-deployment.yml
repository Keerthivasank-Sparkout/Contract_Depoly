apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-backend
  labels:
    app: task-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-backend

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: task-backend

    spec:
      containers:
        - name: task-backend
          image: task-backend
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URI
              value: mongodb://host.docker.internal:27017/taskdb

---
apiVersion: v1
kind: Service

metadata:
  name: task-backend-service

spec:
  type: NodePort

  selector:
    app: task-backend

  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
      nodePort: 30008
  